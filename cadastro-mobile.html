<title>PROMONT — Cadastro</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E30613;--dark:#2C2C2C;--mid:#4A4A4A;
  --border:#E4E4E4;--bg:#F5F5F5;--white:#fff;
  --radius:10px;--inp-h:48px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);font-size:15px;min-height:100vh}

/* HEADER */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.hdr img{height:36px;width:auto}
.hdr-text{flex:1}
.hdr-title{font-size:13px;font-weight:700;color:var(--dark)}
.hdr-sub{font-size:11px;color:#888;margin-top:1px}

/* WELCOME BANNER */
.welcome{background:var(--dark);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;margin:12px 12px 0}
.welcome{border-radius:var(--radius)}
.w-avatar{width:40px;height:40px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.w-name{font-size:15px;font-weight:700}
.w-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.w-id{font-size:10px;color:rgba(255,255,255,.4);font-family:monospace;margin-left:auto;white-space:nowrap}

/* RECOVERY */
.recovery-bar{background:#FFF8F0;border:1px solid #FFE4B5;border-radius:var(--radius);margin:12px 12px 0;padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:12px;color:#92400E}
.recovery-bar button{background:none;border:none;color:var(--red);font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0}
.recovery-box{background:var(--white);border-radius:var(--radius);margin:12px 12px 0;padding:16px;border:1px solid var(--border)}
.recovery-box input{width:100%;height:var(--inp-h);border:1px solid var(--border);border-radius:8px;padding:0 14px;font-size:15px;font-family:inherit;outline:none}
.recovery-box input:focus{border-color:var(--red)}

/* SECTIONS */
.section{background:var(--white);border-radius:var(--radius);margin:12px 12px 0;padding:16px;border:1px solid var(--border)}
.section-title{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);padding-bottom:12px;border-bottom:1px solid var(--bg);margin-bottom:16px}
.section-title i{color:var(--red);font-size:14px}

/* FORM FIELDS */
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:600;color:var(--mid);margin-bottom:6px}
.field label .req{color:var(--red);margin-left:2px}
.field input,.field select,.field textarea{
  width:100%;height:var(--inp-h);
  border:1px solid var(--border);border-radius:8px;
  padding:0 14px;font-size:15px;font-family:inherit;
  background:var(--white);color:var(--dark);outline:none;
  appearance:none;-webkit-appearance:none;
  transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red)}
.field textarea{height:auto;min-height:90px;padding:12px 14px;resize:none;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ddi-row{display:grid;grid-template-columns:130px 1fr;gap:8px}
.char-count{font-size:11px;color:#AAA;text-align:right;margin-top:4px}

/* PROJETOS */
.proj-add-btn{width:100%;height:48px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:12px}
.proj-add-btn:active{background:#B30410}

.proj-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.proj-card:last-child{margin-bottom:0}
.proj-card-hdr{background:var(--dark);padding:10px 14px;display:flex;align-items:center;gap:8px}
.proj-card-num{font-size:11px;font-weight:700;color:var(--red);letter-spacing:.05em;text-transform:uppercase}
.proj-card-preview{font-size:11px;color:rgba(255,255,255,.5);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-card-actions{display:flex;gap:6px;flex-shrink:0}
.proj-btn{width:30px;height:30px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.proj-btn.del{border-color:rgba(227,6,19,.4);color:rgba(227,6,19,.8)}
.proj-card-body{padding:14px}

/* STATUS PILLS */
.status-pills{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.status-pill{height:36px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--mid);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.status-pill.sel{background:var(--red);color:#fff;border-color:var(--red)}
.status-pill.sel-PROSPECCAO{background:#3B82F6;color:#fff;border-color:#3B82F6}
.status-pill.sel-OPORTUNIDADE{background:#EAB308;color:#fff;border-color:#EAB308}
.status-pill.sel-POC{background:#F97316;color:#fff;border-color:#F97316}
.status-pill.sel-PROPOSTA{background:#8B5CF6;color:#fff;border-color:#8B5CF6}
.status-pill.sel-PROJETO_ATIVO{background:#22C55E;color:#fff;border-color:#22C55E}
.status-pill.sel-HOMOLOGACAO{background:#3B82F6;color:#fff;border-color:#3B82F6}
.status-pill.sel-CERTIFICACAO{background:#0EA5E9;color:#fff;border-color:#0EA5E9}
.status-pill.sel-EM_PAUSA{background:#6B7280;color:#fff;border-color:#6B7280}
.status-pill.sel-PERDIDO{background:#EF4444;color:#fff;border-color:#EF4444}

/* PRODUTO LINHA */
.prod-lines{margin-bottom:8px}
.prod-line{display:grid;grid-template-columns:1fr 120px 32px;gap:6px;align-items:center;margin-bottom:6px}
.prod-line select{height:42px;font-size:13px}
.prod-line-rm{width:32px;height:42px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:#CCC;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.prod-line-rm:active{color:var(--red);border-color:var(--red)}
.add-prod-btn{width:100%;height:40px;background:var(--bg);border:1px dashed var(--border);border-radius:8px;color:var(--red);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}

/* DIVIDER */
.divider{height:1px;background:var(--bg);margin:14px 0}
.field-label-sm{font-size:12px;font-weight:600;color:var(--mid);margin-bottom:8px}

/* DICA */
.dica{background:#F0F7FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 12px;font-size:12px;color:#1E40AF;margin-top:12px;display:flex;gap:8px}

/* FOOTER ACTIONS */
.footer{padding:16px 12px 32px;display:flex;flex-direction:column;gap:10px}
.btn-submit{width:100%;height:52px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.btn-submit:disabled{opacity:.6}
.btn-draft{width:100%;height:44px;background:var(--white);color:var(--mid);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}

/* ERROR / TOAST */
.error-box{background:#FFF1F2;border:1px solid #FECDD3;border-radius:8px;padding:12px 14px;font-size:13px;color:#BE123C;margin:0 12px;display:none;align-items:center;gap:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:12px 20px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#BE123C}

.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<!-- WELCOME (hidden by default) -->
<div class="welcome" id="welcomeBanner" style="display:none">

    <div class="w-name" id="w-name"></div>
    <div class="w-sub" id="w-sub"></div>
  </div>
  <div class="w-id" id="w-id"></div>
</div>

<!-- RECOVERY BAR -->
<div class="recovery-bar" id="recoveryBar">
  <i class="ti ti-key"></i>
  <span>Já é representante?</span>
  <button onclick="toggleRecovery()">Recuperar acesso</button>
</div>

<div class="recovery-box" id="recoveryBox" style="display:none">
  <div class="field">
    <label>E-mail ou telefone cadastrado</label>
    <input id="recoveryInput" type="text" placeholder="seu@email.com ou +55 11 99999-9999">
  </div>
  <button onclick="recuperarAcesso()" style="width:100%;height:48px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:10px">
    <i class="ti ti-send"></i> Enviar link de acesso
  </button>
</div>

<!-- ERROR -->
<div class="error-box" id="error-box">
  <i class="ti ti-alert-circle"></i>
  <span id="error-msg"></span>
</div>

<!-- DADOS PESSOAIS -->
<div class="section">
  <div class="section-title"><i class="ti ti-user"></i> Dados Pessoais</div>

  <div class="field">
    <label>Nome <span class="req">*</span></label>
    <input id="nome" type="text" placeholder="Seu primeiro nome" autocomplete="given-name">
  </div>
  <div class="field">
    <label>Sobrenome <span class="req">*</span></label>
    <input id="sobrenome" type="text" placeholder="Seu sobrenome" autocomplete="family-name">
  </div>
  <div class="field">
    <label>WhatsApp / Celular <span class="req">*</span></label>
    <div class="ddi-row">
      <select id="ddi"></select>
      <input id="whats" type="tel" placeholder="99 99999-9999" autocomplete="tel">
    </div>
  </div>
  <div class="field">
    <label>E-mail <span class="req">*</span></label>
    <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>País <span class="req">*</span></label>
    <select id="pais" onchange="autoDDI(this.value)"></select>
  </div>
  <div class="field">
    <label>Cidade <span class="req">*</span></label>
    <input id="cidade" type="text" placeholder="Sua cidade" autocomplete="address-level2">
  </div>
  <div class="field">
    <label>Empresa <span class="req">*</span></label>
    <input id="empresa" type="text" placeholder="Empresa onde trabalha" autocomplete="organization">
  </div>
  <div class="field">
    <label>LinkedIn</label>
    <input id="linkedin" type="url" placeholder="linkedin.com/in/seuperfil" autocomplete="url">
  </div>
</div>

<!-- ÁREA DE ATUAÇÃO -->
<div class="section">
  <div class="section-title"><i class="ti ti-map-pin"></i> Área de Atuação — Clientes e Projetos</div>
  <p style="font-size:13px;color:#888;margin-bottom:14px">Adicione um ou mais projetos. O status indica a fase atual de cada um.</p>
  <button class="proj-add-btn" onclick="addProjeto()">
    <i class="ti ti-plus"></i> Adicionar projeto
  </button>
  <div id="projetos-container"></div>
  <div class="dica">
    <i class="ti ti-info-circle" style="flex-shrink:0"></i>
    Use o título do projeto para identificar rapidamente cada iniciativa.
  </div>
</div>

<!-- FOOTER -->

  <button class="btn-draft" onclick="salvarRascunho()">
    <i class="ti ti-download"></i> Salvar rascunho
  </button>
</div>

function buildPaisOptions(current) {
  const subsSeen = [];
  let h = '<option value="">— país —</option>';
  PAISES_DATA.forEach(p => {
    if (!subsSeen.includes(p.sub)) {
      if (subsSeen.length) h += '</optgroup>';
      h += '<optgroup label="' + p.sub + '">';
      subsSeen.push(p.sub);
    }
    const sel = p.nome === current ? ' selected' : '';
    h += '<option value="' + p.nome + '"' + sel + '>' + p.flag + ' ' + p.nome + '</option>';
  });
  if (subsSeen.length) h += '</optgroup>';
  return h;
}

async function carregarPerfil(token){
  try{
    const r = await fetch(APPS_URL+'?action=getProfile&token='+token);
    const j = await r.json();
    if(j.status==='ok'){
      repId=j.perfil.repId; repToken=j.perfil.token;
      const p=j.perfil;
      sv('nome',p.nome); sv('sobrenome',p.sobrenome);
      sv('pais',p.pais); sv('cidade',p.cidade);
      sv('empresa',p.empresa); sv('email',p.email);
      const tel=(p.telefone||'').split(' ');
      if(tel[0]) document.getElementById('ddi').value=tel[0];
      sv('whats', tel.slice(1).join(' '));
      sv('linkedin',p.linkedin);
      // Welcome banner
      const av=ini(p.nome+' '+p.sobrenome);
      document.getElementById('w-avatar').textContent=av;
      document.getElementById('w-name').textContent='Olá, '+p.nome+'!';
      document.getElementById('w-sub').textContent=(p.empresa||'')+' · '+(p.pais||'');
      document.getElementById('w-id').textContent=repId||'';
      document.getElementById('welcomeBanner').style.display='flex';
      document.getElementById('recoveryBar').style.display='none';
      document.getElementById('hdr-title').textContent='Atualizar Cadastro';
      document.getElementById('hdr-sub').textContent='Seus dados foram carregados.';
      document.getElementById('btn-label').textContent='Salvar atualização';
      localStorage.setItem('promont_rep_token',token);
      linhas = j.atividades&&j.atividades.length ? j.atividades.map(a=>{
        return {
          id:'p'+(rowId++), titulo:a.titulo||'', pais:a.pais||'',
          cliente:a.cliente||'', vertical:a.vertical||a.area||'',
          areaCli:a.area_cliente||a.areaCli||'',
          aplicacao:a.aplicacao||(a.projetos&&a.projetos[0])||'',
          prods:a.produtos||[], obs:a.obs||'', status:a.status||'',
          collapsed:false
        };
      }) : [];
      if(!linhas.length) addProjeto();
      else renderProjetos();
    } else { addProjeto(); }
  } catch(e){ addProjeto(); }
}

// ── PROJETOS ─────────────────────────────────────────────────
function addProjeto(){
  linhas.push({id:'p'+(rowId++),titulo:'',pais:'',cliente:'',vertical:'',areaCli:'',aplicacao:'',prods:[],obs:'',status:'',collapsed:false});
  renderProjetos();
  setTimeout(()=>{
    const cards=document.querySelectorAll('.proj-card');
    if(cards.length && cards[cards.length-1].scrollIntoView) cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'nearest'});
  },100);
}

function removeProjeto(id){
  linhas=linhas.filter(p=>p.id!==id);
  renderProjetos();
}

function dupProjeto(id){
  const src=linhas.find(p=>p.id===id);
  const idx=linhas.indexOf(src);
  linhas.splice(idx+1,0,{...src,id:'p'+(rowId++),titulo:src.titulo?src.titulo+' (cópia)':'',prods:[...src.prods],collapsed:false});
  renderProjetos();
}

function toggleProjeto(id){
  const p=linhas.find(p=>p.id===id);
  if(p){ p.collapsed=!p.collapsed; renderProjetos(); }
}

function uProj(id,f,v){ const p=linhas.find(p=>p.id===id); if(p) p[f]=v; }

function addTagProd(id,val){
  const p=linhas.find(p=>p.id===id); if(!p) return;
  const nome=val.split(':')[0];
  const existe=p.prods.some(x=>x.split(':')[0]===nome);
  if(existe) p.prods=p.prods.map(x=>x.split(':')[0]===nome?val:x);
  else p.prods.push(val);
  renderProjetos();
}

function rmProd(id,idx){
  const p=linhas.find(p=>p.id===id); if(!p) return;
  p.prods.splice(idx,1);
  renderProjetos();
}

function renderProjetos(){
  const cont=document.getElementById('projetos-container');
  cont.innerHTML='';
  linhas.forEach((proj,num)=>{
    const card=document.createElement('div');
    card.className='proj-card';
    card.id='proj-'+proj.id;

    // Header
    const hdr=document.createElement('div');
    hdr.className='proj-card-hdr';
    const numEl=document.createElement('span');
    numEl.className='proj-card-num';
    numEl.textContent='PROJETO #'+(num+1);
    const preview=document.createElement('span');
    preview.className='proj-card-preview';
    preview.textContent=proj.titulo||proj.cliente||'';
    const acts=document.createElement('div');
    acts.className='proj-card-actions';
    const dupBtn=document.createElement('button');
    dupBtn.className='proj-btn'; dupBtn.innerHTML='<i class="ti ti-copy"></i>';
    (function(pid){dupBtn.onclick=()=>dupProjeto(pid);})(proj.id);
    const delBtn=document.createElement('button');
    delBtn.className='proj-btn del'; delBtn.innerHTML='<i class="ti ti-trash"></i>';
    (function(pid){delBtn.onclick=()=>removeProjeto(pid);})(proj.id);
    const togBtn=document.createElement('button');
    togBtn.className='proj-btn';
    togBtn.innerHTML=proj.collapsed?'<i class="ti ti-chevron-down"></i>':'<i class="ti ti-chevron-up"></i>';
    (function(pid){togBtn.onclick=()=>toggleProjeto(pid);})(proj.id);
    acts.appendChild(dupBtn); acts.appendChild(delBtn); acts.appendChild(togBtn);
    hdr.appendChild(numEl); hdr.appendChild(preview); hdr.appendChild(acts);
    card.appendChild(hdr);

    if(!proj.collapsed){
      const body=document.createElement('div');
      body.className='proj-card-body';

      // Título
      body.appendChild(mField('Título do projeto','text',proj.titulo,'Ex: Expansão Hub Logístico',v=>uProj(proj.id,'titulo',v)));

      // Status pills
      const stWrap=document.createElement('div');
      stWrap.innerHTML='<div class="field-label-sm">Status</div>';
      const pills=document.createElement('div');
      pills.className='status-pills';
      STATUS_OPTS.filter(s=>s.v).forEach(s=>{
        const btn=document.createElement('button');
        btn.className='status-pill'+(proj.status===s.v?' sel sel-'+s.v:'');
        btn.textContent=s.l;
        (function(pid,sv){btn.onclick=()=>{
          linhas.find(p=>p.id===pid).status=sv;
          renderProjetos();
        };})(proj.id,s.v);
        pills.appendChild(btn);
      });
      stWrap.appendChild(pills);
      body.appendChild(stWrap);

      body.appendChild(document.createElement('div')).className='divider';

      // País
      const paisF=document.createElement('div'); paisF.className='field';
      paisF.innerHTML='<label>País <span class="req">*</span></label>';
      const paisSel=document.createElement('select');
      paisSel.innerHTML=buildPaisOptions(proj.pais);
      (function(pid){paisSel.onchange=()=>uProj(pid,'pais',paisSel.value);})(proj.id);
      paisF.appendChild(paisSel); body.appendChild(paisF);

      // Cliente
      body.appendChild(mField('Cliente','text',proj.cliente,'Nome do cliente',v=>uProj(proj.id,'cliente',v)));

      // Vertical
      body.appendChild(mSelect('Vertical',VERTICAIS,'— vertical —',proj.vertical,v=>uProj(proj.id,'vertical',v)));

      // Área do Cliente
      body.appendChild(mSelect('Área do Cliente',AREAS_CLIENTE,'— área —',proj.areaCli,v=>uProj(proj.id,'areaCli',v)));

      // Aplicação
      body.appendChild(mSelect('Aplicação',APLICACOES,'— aplicação —',proj.aplicacao,v=>uProj(proj.id,'aplicacao',v)));

      body.appendChild(document.createElement('div')).className='divider';

      // Produtos
      const prodWrap=document.createElement('div');
      prodWrap.innerHTML='<div class="field-label-sm">Produtos e projeção</div>';
      const prodLines=document.createElement('div');
      prodLines.className='prod-lines';
      proj.prods.forEach((prod,i)=>{
        const pts=prod.split(':');
        const nome=pts[0]; const faixa=pts[1]||'';
        const line=document.createElement('div');
        line.className='prod-line';
        const pSel=document.createElement('select');
        PRODUTOS.forEach(p=>{
          const o=document.createElement('option'); o.value=p; o.textContent=p;
          if(p===nome) o.selected=true; pSel.appendChild(o);
        });
        (function(pid,idx){pSel.onchange=function(){
          const p=linhas.find(x=>x.id===pid);
          if(p){ const f=p.prods[idx].split(':')[1]||'1–50'; p.prods[idx]=this.value+':'+f; }
        };})(proj.id,i);
        const fSel=document.createElement('select');
        ['1–50','51–100','101–200','201–500','501–1000','1000+','5000+'].forEach(f=>{
          const o=document.createElement('option'); o.value=f; o.textContent=f;
          if(f===faixa) o.selected=true; fSel.appendChild(o);
        });
        (function(pid,idx){fSel.onchange=function(){
          const p=linhas.find(x=>x.id===pid);
          if(p){ const n=p.prods[idx].split(':')[0]; p.prods[idx]=n+':'+this.value; }
        };})(proj.id,i);
        const rm=document.createElement('button');
        rm.className='prod-line-rm'; rm.textContent='×';
        (function(pid,idx){rm.onclick=()=>rmProd(pid,idx);})(proj.id,i);
        line.appendChild(pSel); line.appendChild(fSel); line.appendChild(rm);
        prodLines.appendChild(line);
      });
      // Add produto
      const addPLine=document.createElement('div');
      addPLine.className='prod-line';
      const newPSel=document.createElement('select');
      newPSel.innerHTML='<option value="">— produto —</option>'+PRODUTOS.map(p=>`<option>${p}</option>`).join('');
      const newFSel=document.createElement('select');
      ['1–50','51–100','101–200','201–500','501–1000','1000+','5000+'].forEach(f=>{
        const o=document.createElement('option'); o.value=f; o.textContent=f; newFSel.appendChild(o);
      });
      const addPBtn=document.createElement('button');
      addPBtn.className='prod-line-rm'; addPBtn.style.cssText='background:var(--red);border-color:var(--red);color:#fff;font-size:18px';
      addPBtn.textContent='+';
      (function(pid){addPBtn.onclick=()=>{
        if(!newPSel.value) return;
        addTagProd(pid,newPSel.value+':'+newFSel.value);
        newPSel.value='';
      };})(proj.id);
      addPLine.appendChild(newPSel); addPLine.appendChild(newFSel); addPLine.appendChild(addPBtn);
      prodLines.appendChild(addPLine);
      prodWrap.appendChild(prodLines);
      body.appendChild(prodWrap);

      body.appendChild(document.createElement('div')).className='divider';

      // Obs
      const obsF=document.createElement('div'); obsF.className='field';
      obsF.innerHTML='<label>Observações</label>';
      const obsTa=document.createElement('textarea');
      obsTa.placeholder='Detalhes relevantes do projeto (até 500 caracteres)...';
      obsTa.maxLength=500; obsTa.value=proj.obs||'';
      (function(pid){obsTa.oninput=()=>uProj(pid,'obs',obsTa.value);})(proj.id);
      const obsCount=document.createElement('div');
      obsCount.className='char-count';
      obsCount.textContent=(proj.obs||'').length+'/500';
      obsTa.addEventListener('input',()=>obsCount.textContent=obsTa.value.length+'/500');
      obsF.appendChild(obsTa); obsF.appendChild(obsCount);
      body.appendChild(obsF);

      card.appendChild(body);
    }
    cont.appendChild(card);
  });
}

// ── HELPERS DE CAMPO ─────────────────────────────────────────
function mField(label,type,val,ph,onChange){
  const div=document.createElement('div'); div.className='field';
  div.innerHTML=`<label>${label}</label>`;
  const inp=document.createElement('input');
  inp.type=type; inp.placeholder=ph; inp.value=val||'';
  inp.oninput=()=>onChange(inp.value);
  div.appendChild(inp); return div;
}

function mSelect(label,opts,ph,val,onChange){
  const div=document.createElement('div'); div.className='field';
  div.innerHTML=`<label>${label}</label>`;
  const sel=document.createElement('select');
  const ph_opt=document.createElement('option');
  ph_opt.value=''; ph_opt.textContent=ph;
  if(!val) ph_opt.selected=true;
  sel.appendChild(ph_opt);
  opts.forEach(o=>{
    const opt=document.createElement('option'); opt.value=o; opt.textContent=o;
    if(o===val) opt.selected=true; sel.appendChild(opt);
  });
  sel.onchange=()=>onChange(sel.value);
  div.appendChild(sel); return div;
}

// ── UTILS ────────────────────────────────────────────────────
function gv(id){ return (document.getElementById(id)||{}).value?.trim()||''; }
function sv(id,val){ const el=document.getElementById(id); if(el) el.value=val||''; }
function ini(s){ return (s||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('')||'?'; }
function autoDDI(code){ if(DDI_MAP[code]) document.getElementById('ddi').value=DDI_MAP[code]; }
function showError(m){ const b=document.getElementById('error-box'); document.getElementById('error-msg').textContent=m; b.style.display='flex'; }
function hideError(){ document.getElementById('error-box').style.display='none'; }
function showToast(msg,err=false){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.className='toast'+(err?' err':'');
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>t.classList.remove('show'),4000);
}
function setSending(s){
  const b=document.getElementById('btn-enviar');
  b.disabled=s;
  document.getElementById('btn-label').textContent=s?'Enviando...':(repToken?'Salvar atualização':'Enviar cadastro');
  document.getElementById('btn-icon').className=s?'ti ti-loader-2 spin':'ti ti-send';
}

// ── COLETA ───────────────────────────────────────────────────
function coletarDados(){
  return {
    timestamp:new Date().toISOString(),
    dadosPessoais:{
      repId:repId||null, token:repToken||null,
      nome:gv('nome'), sobrenome:gv('sobrenome'),
      pais:gv('pais'), cidade:gv('cidade'),
      empresa:gv('empresa'), email:gv('email'),
      telefone:gv('ddi')+' '+gv('whats'), linkedin:gv('linkedin')
    },
    atuacao:linhas.filter(p=>p.cliente&&p.cliente.trim()).map(p=>{
      return {
        titulo:p.titulo||'', pais:p.pais, cliente:p.cliente,
        vertical:p.vertical||'', area:p.vertical||'',
        area_cliente:p.areaCli||'', aplicacao:p.aplicacao||'',
        produtos:p.prods, qtd_estimada:'',
        projetos:p.aplicacao?[p.aplicacao]:[],
        status:p.status||'', obs:p.obs||''
      };
    })
  };
}

function salvarRascunho(){
  const b=new Blob([JSON.stringify(coletarDados(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='rascunho_promont.json'; a.click();
}

async function enviar(){
  const req=['nome','sobrenome','pais','cidade','empresa','email','whats'];
  let ok=true;
  req.forEach(id=>{
    const el=document.getElementById(id);
    if(!el||!el.value.trim()){ if(el) el.style.borderColor='var(--red)'; ok=false; }
    else if(el) el.style.borderColor='var(--border)';
  });
  if(!ok){ showError('Preencha todos os campos obrigatórios (*).'); return; }
  hideError(); setSending(true);
  try{
    const dados=coletarDados();
    const url=APPS_URL+'?data='+encodeURIComponent(JSON.stringify(dados));
    let resultado=null;
    try{ const resp=await fetch(url,{method:'GET'}); if(resp.ok) resultado=await resp.json(); }
    catch(corsErr){ await fetch(url,{method:'GET',mode:'no-cors'}); }
    await new Promise(r=>setTimeout(r,2000));
    setSending(false);
    if(resultado&&resultado.token){
      localStorage.setItem('promont_rep_token',resultado.token);
      repToken=resultado.token; repId=resultado.repId;
    }
    showToast(repToken?'✅ Cadastro atualizado! Verifique seu e-mail.':'✅ Enviado! Verifique seu e-mail para o link de acesso.');
    if(!repToken) setTimeout(()=>location.reload(),3500);
  } catch(e){
    setSending(false);
    showError('Não foi possível enviar. Verifique sua conexão.');
  }
}

async function recuperarAcesso(){
  const q=document.getElementById('recoveryInput').value.trim();
  if(!q){ showToast('Informe e-mail ou telefone','err'); return; }
  try{
    const r=await fetch(APPS_URL+'?action=recoverAccess&query='+encodeURIComponent(q));
    const j=await r.json();
    showToast(j.status==='ok'?'✅ Link enviado para o seu e-mail!':'❌ '+j.message, j.status!=='ok');
  } catch(e){ showToast('Erro ao conectar. Tente novamente.','err'); }
}
