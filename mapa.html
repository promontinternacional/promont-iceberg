<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Promont — Mapa de Representantes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E30613; --red-deep:#B30410; --red-soft:#FEF2F3;
  --ink:#2C2C2C; --ink-2:#2C2C2C; --slate:#555555; --mute:#888888;
  --line:#E6E8EE; --line-2:#EEF1F6; --bg:#F6F7FB; --card:#FFFFFF;
  --shadow-sm:0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --shadow-md:0 4px 16px -4px rgba(15,23,42,.10), 0 2px 6px rgba(15,23,42,.05);
  --shadow-lg:0 20px 50px -20px rgba(15,23,42,.25);
  --r-sm:6px; --r:10px; --r-lg:14px; --r-xl:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  background:
    radial-gradient(1200px 600px at 90% -10%, rgba(227,6,19,.06), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(11,11,15,.05), transparent 60%),
    var(--bg);
  color:var(--ink); -webkit-font-smoothing:antialiased; min-height:100vh;
  font-feature-settings:"cv11","ss01","ss03";
}
button{font-family:inherit}

/* ============== HEADER ============== */
.hdr{
  position:sticky; top:0; z-index:50;
  background:rgba(255,255,255,.85);
  backdrop-filter:saturate(180%) blur(14px);
  -webkit-backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--line);
}
.hdr-inner{
  max-width:1180px; margin:0 auto; padding:14px 24px;
  display:flex; align-items:center; gap:18px; justify-content:space-between;
}
.brand{display:flex; align-items:center; gap:14px; min-width:0}
.brand img{height:30px; display:block}
.brand-divider{width:1px; height:28px; background:var(--line)}
.brand-text{min-width:0}
.brand-title{font-size:14px; font-weight:700; letter-spacing:-.01em; color:var(--ink)}
.brand-sub{font-size:11.5px; color:var(--slate); margin-top:2px}
.brand-sub b{color:var(--red); font-weight:700; font-variant-numeric:tabular-nums}

.hdr-actions{display:flex; gap:8px; align-items:center; flex-shrink:0}
.btn{
  display:inline-flex; align-items:center; gap:6px; cursor:pointer;
  padding:8px 12px; border-radius:var(--r-sm); font-size:12.5px; font-weight:600;
  border:1px solid var(--line); background:#fff; color:var(--ink-2);
  transition:all .15s ease; box-shadow:var(--shadow-sm);
}
.btn:hover{border-color:#CBD5E1; transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--ink); border-color:var(--ink); color:#fff}
.btn.primary:hover{background:var(--red); border-color:var(--red)}
.btn svg{width:14px; height:14px}

/* ============== SUB-HEADER: search + stats ============== */
.subhdr{
  max-width:1180px; margin:0 auto; padding:22px 24px 10px;
  display:grid; grid-template-columns:1fr auto; gap:16px; align-items:end;
}
.title-block h1{
  font-size:28px; font-weight:800; letter-spacing:-.02em; line-height:1.1;
}
.title-block h1 .accent{
  background:linear-gradient(90deg, var(--red), #FF6B6B);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.title-block p{font-size:13.5px; color:var(--slate); margin-top:6px; max-width:560px}

.stats{display:flex; gap:10px}
.stat{
  background:var(--card); border:1px solid var(--line); border-radius:var(--r);
  padding:10px 14px; min-width:96px; box-shadow:var(--shadow-sm);
}
.stat-k{font-size:10.5px; color:var(--mute); text-transform:uppercase; letter-spacing:.08em; font-weight:600}
.stat-v{font-size:20px; font-weight:800; color:var(--ink); margin-top:2px; font-variant-numeric:tabular-nums; letter-spacing:-.02em}
.stat-sub{font-size:10px; color:var(--mute); font-weight:600; margin-top:1px}
.stat.red .stat-v{color:var(--red)}

/* ============== TOOLBAR ============== */
.toolbar{
  max-width:1180px; margin:14px auto 0; padding:0 24px;
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.search{
  flex:1; min-width:240px; position:relative;
  background:#fff; border:1px solid var(--line); border-radius:var(--r);
  display:flex; align-items:center; padding:0 12px 0 38px;
  box-shadow:var(--shadow-sm); transition:border-color .15s, box-shadow .15s;
}
.search:focus-within{border-color:var(--red); box-shadow:0 0 0 4px rgba(227,6,19,.08)}
.search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--mute)}
.search input{
  width:100%; border:0; outline:0; padding:11px 0; font-size:13.5px;
  background:transparent; color:var(--ink); font-family:inherit;
}
.search input::placeholder{color:var(--mute)}
.search .clear{
  background:transparent; border:0; cursor:pointer; color:var(--mute);
  padding:4px 6px; font-size:12px; border-radius:4px;
}
.search .clear:hover{color:var(--ink); background:var(--line-2)}

.chips{display:flex; gap:6px; flex-wrap:wrap}
.chip{
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 12px; border-radius:99px; font-size:12px; font-weight:600;
  border:1px solid var(--line); background:#fff; color:var(--ink-2);
  cursor:pointer; transition:all .15s; box-shadow:var(--shadow-sm);
}
.chip:hover{border-color:#CBD5E1}
.chip.active{border-color:var(--ink); background:var(--ink); color:#fff}
.chip .num{
  font-size:10.5px; padding:1px 6px; border-radius:99px;
  background:var(--line-2); color:var(--slate); font-weight:700;
}
.chip.active .num{background:rgba(255,255,255,.18); color:#fff}

/* ============== MAPA ============== */
.mapa{max-width:1180px; margin:18px auto 80px; padding:0 24px}

/* CONTINENT — big card */
.cont{
  background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl);
  margin-bottom:18px; overflow:hidden; box-shadow:var(--shadow-md);
  transition:box-shadow .2s;
}
.cont:hover{box-shadow:var(--shadow-lg)}
.cont-head{
  display:flex; align-items:center; gap:14px;
  padding:18px 22px; cursor:pointer; user-select:none;
  background:linear-gradient(180deg, #FAFBFD 0%, #FFFFFF 100%);
  border-bottom:1px solid transparent;
}
.cont.open > .cont-head{border-bottom-color:var(--line-2)}
.cont-emoji{
  width:44px; height:44px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--ink) 0%, var(--ink-2) 100%);
  border-radius:var(--r); font-size:22px;
  box-shadow:0 6px 16px -6px rgba(11,11,15,.4);
}
.cont-title{flex:1; min-width:0}
.cont-name{font-size:17px; font-weight:800; letter-spacing:-.01em; color:var(--ink)}
.cont-meta{font-size:12px; color:var(--slate); margin-top:2px}
.cont-meta b{color:var(--ink); font-weight:700; font-variant-numeric:tabular-nums}
.chev{
  width:32px; height:32px; flex-shrink:0; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  color:var(--slate); transition:all .2s; background:transparent;
}
.cont-head:hover .chev{background:var(--line-2); color:var(--ink)}
.chev svg{width:14px; height:14px; transition:transform .25s ease}
.cont.open .chev svg{transform:rotate(90deg)}

.cont-body{display:none; padding:8px 22px 22px}
.cont.open > .cont-body{display:block}

/* SUB-REGION */
.sub{margin-top:10px}
.sub:first-child{margin-top:4px}
.sub-head{
  display:flex; align-items:center; gap:10px;
  padding:9px 10px; cursor:pointer; user-select:none;
  border-top:1px solid var(--line-2);
  border-radius:var(--r-sm);
  transition:background .12s;
}
.sub-head:hover{background:var(--line-2)}
.sub:first-child .sub-head{border-top:0; padding-top:6px}
.sub-bar{width:3px; height:14px; border-radius:2px; background:var(--red); flex-shrink:0}
.sub-name{
  font-size:11px; font-weight:700; color:var(--ink-2);
  text-transform:uppercase; letter-spacing:.1em; flex:1;
}
.sub-count{font-size:11px; color:var(--mute); font-weight:600; font-variant-numeric:tabular-nums}
.sub-chev{color:var(--mute); transition:transform .2s}
.sub.open .sub-chev{transform:rotate(90deg)}
.sub-body{display:none; padding:4px 0 4px 12px; border-left:2px solid var(--line-2); margin-left:8px; margin-top:4px}
.sub.open > .sub-body{display:block}

/* COUNTRIES — lista vertical */
.country-grid{display:flex; flex-direction:column; gap:4px}
.country{
  background:#fff; border:1px solid var(--line); border-radius:var(--r);
  overflow:hidden; transition:all .15s;
}
.country.has-data{border-color:#DEE3EC}
.country.has-data:hover{border-color:#BBC2CD; box-shadow:var(--shadow-md)}
.country-empty-row{
  display:flex; align-items:center; gap:8px;
  padding:3px 14px; height:22px;
  border-top:1px solid #F5F5F5;
}
.cer-flag{font-size:11px; opacity:.4; line-height:1}
.cer-name{font-size:11px; color:#CCCCCC; font-weight:400; line-height:1}
.country-head{
  display:flex; align-items:center; gap:10px;
  padding:12px 14px; cursor:pointer; user-select:none;
}
.country.empty .country-head{cursor:default}
.flag{font-size:22px; line-height:1; flex-shrink:0}
.country-name{flex:1; font-size:13.5px; font-weight:700; color:var(--ink); letter-spacing:-.005em}
.country-badge{
  font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:99px;
  background:var(--red-soft); color:var(--red-deep);
  font-variant-numeric:tabular-nums;
}
.country.empty .country-badge{background:var(--line-2); color:var(--mute); font-weight:600}
.country-chev{color:var(--mute); transition:transform .2s; flex-shrink:0}
.country.open .country-chev{transform:rotate(90deg)}
.country-body{display:none; padding:0 14px 14px; border-top:1px solid var(--line-2); margin-top:0}
.country.open .country-body{display:block; padding:8px 14px 14px; animation:fadeIn .15s ease}

/* COMPANY (rep) */
.company{margin-top:10px}
.company:first-child{margin-top:2px}
.company-head{
  display:flex; align-items:center; gap:9px; padding:8px 10px;
  background:linear-gradient(135deg, #4A4A4A 0%, #4A4A4A 100%);
  color:#fff; border-radius:8px; cursor:pointer; user-select:none;
  box-shadow:0 2px 8px -2px rgba(30,58,95,.4);
}
.company-ini{
  width:24px; height:24px; flex-shrink:0; border-radius:6px;
  background:rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:800; letter-spacing:-.02em;
}
.company-name{flex:1; font-size:12px; font-weight:700; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.company-cnt{font-size:10px; background:rgba(255,255,255,.15); padding:2px 7px; border-radius:99px; font-weight:700}
.company-chev{color:rgba(255,255,255,.7); transition:transform .2s}
.company.open .company-chev{transform:rotate(90deg)}
.company-body{display:none; padding:6px 0 4px 12px; border-left:2px solid var(--line-2); margin-left:10px; margin-top:2px}
.company.open .company-body{display:block}

/* CLIENT */
.client{margin-top:8px}
.client:first-child{margin-top:0}
.client-head{
  display:flex; align-items:center; gap:8px; padding:7px 10px;
  background:#fff; border:1px solid var(--line); border-radius:7px;
  cursor:pointer; user-select:none; margin-left:8px;
}
.client-head:hover{border-color:#CBD5E1}
.client-icon{font-size:13px; flex-shrink:0}
.client-name{flex:1; font-size:12px; font-weight:600; color:var(--ink-2)}
.client-chev{color:var(--mute); transition:transform .2s}
.client.open .client-chev{transform:rotate(90deg)}
.client-body{display:none; padding:6px 0 4px 12px; border-left:2px solid var(--line-2); margin-left:10px; margin-top:2px}
.client.open .client-body{display:block}

/* PROJECT CARD */
.proj{
  background:#FAFBFD; border:1px solid var(--line-2); border-radius:8px;
  padding:10px 12px; margin-bottom:6px;
}
.proj:last-child{margin-bottom:0}
.proj-row{display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; font-size:11.5px}
.proj-row:last-child{margin-bottom:0}
.proj-label{
  color:var(--mute); font-weight:700; min-width:62px; flex-shrink:0;
  font-size:10px; text-transform:uppercase; letter-spacing:.06em; padding-top:2px;
}
.tags{display:flex; flex-wrap:wrap; gap:4px; flex:1; min-width:0}
.tag{
  border-radius:99px; padding:2px 8px; font-size:10.5px; font-weight:600;
  line-height:1.5; white-space:nowrap;
}
.tag.area{background:#FFF0F0; color:#E30613}
.tag.prod{background:var(--red-soft); color:var(--red-deep)}
.tag.proj{background:#F0FDF4; color:#15803D}
.tag.loc{background:#F1F5F9; color:#555555; font-weight:500}
.proj-rep{
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  margin-top:8px; padding-top:8px; border-top:1px dashed var(--line);
}
.rep-avatar{
  width:22px; height:22px; flex-shrink:0; border-radius:50%;
  background:linear-gradient(135deg, var(--red), var(--red-deep));
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:800; letter-spacing:-.02em;
  box-shadow:0 2px 6px -2px rgba(227,6,19,.5);
}
.rep-name{font-size:11.5px; font-weight:700; color:var(--ink)}

/* ============== STATES ============== */
.empty,.loading{
  text-align:center; padding:80px 24px;
  background:var(--card); border:1px dashed var(--line); border-radius:var(--r-xl);
}
.empty-icon{font-size:46px; margin-bottom:14px; opacity:.6}
.empty h3{font-size:16px; font-weight:700; margin-bottom:6px; color:var(--ink)}
.empty p{font-size:13px; color:var(--slate); line-height:1.6}
.loading{display:flex; flex-direction:column; align-items:center; gap:14px; color:var(--slate); font-size:13px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px; height:28px; border:2.5px solid var(--line); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite}

.hidden{display:none !important}

/* ============== RESPONSIVE ============== */
@media (max-width:760px){
  .hdr-inner{padding:12px 16px}
  .brand-text{display:none}
  .subhdr{grid-template-columns:1fr; padding:18px 16px 8px}
  .toolbar{padding:0 16px}
  .mapa{padding:0 16px}
  .stats{overflow-x:auto; padding-bottom:4px}
  .stat{min-width:88px}
  .cont-head{padding:14px 16px}
  .cont-body{padding:6px 16px 16px}
  .country-grid{grid-template-columns:1fr}
  .title-block h1{font-size:22px}
}

/* STATUS BADGES */
.s-tag{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:.03em;white-space:nowrap}
.s-PROSPECCAO{background:#FFF0F0;color:#E30613;border:1px solid #FAD4D7}
.s-OPORTUNIDADE{background:#FEFCE8;color:#854D0E;border:1px solid #FEF08A}
.s-POC{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA}
.s-PROPOSTA{background:#F5F3FF;color:#B30410;border:1px solid #FAD4D7}
.s-PROJETO_ATIVO{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.s-EM_PAUSA{background:#F9FAFB;color:#374151;border:1px solid #D1D5DB}
.s-PERDIDO{background:#FFF1F2;color:#BE123C;border:1px solid #FECDD3}
.s-HOMOLOGACAO{background:#FFF0F0;color:#E30613;border:1px solid #FAD4D7}
.s-CERTIFICACAO{background:#F0F9FF;color:#B30410;border:1px solid #FAD4D7}


/* ── PROJ CARD ENRIQUECIDO ── */
.proj{background:#FAFAFA;border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:6px}
.proj:last-child{margin-bottom:0}
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:10px}
.proj-field{display:flex;flex-direction:column;gap:3px}
.proj-field-full{grid-column:1/-1;display:flex;flex-direction:column;gap:3px}
.proj-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mute)}
.proj-obs{font-size:11px;color:var(--slate);line-height:1.5;background:#fff;border:1px solid var(--line);border-radius:4px;padding:6px 8px}
/* Rep card */
.rep-card{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);flex-wrap:wrap}
.rep-avatar{width:32px;height:32px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.rep-info{flex:1;min-width:0}
.rep-name-text{font-size:12px;font-weight:600;color:var(--ink)}
.rep-contacts{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.rep-contact-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;text-decoration:none;border:1px solid var(--line);background:#fff;color:var(--slate);transition:all .15s;cursor:pointer}
.rep-contact-btn:hover{border-color:var(--red);color:var(--red)}
.rep-contact-btn.wa{border-color:#DCF8C6;background:#F0FFF4;color:#166534}
.rep-contact-btn.wa:hover{background:#DCFCE7}
.rep-time{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.rep-clock{font-size:11px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.rep-tz{font-size:10px;color:var(--mute)}
.rep-commercial{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;letter-spacing:.04em}
.rep-commercial.open{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.rep-commercial.closed{background:#FFF1F2;color:#BE123C;border:1px solid #FECDD3}
.copy-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--mute);transition:all .12s}
.copy-btn:hover{border-color:var(--ink);color:var(--ink)}


/* ── PROJ CARD — header com título ── */
.client-body{
  background:#F5F5F5;
  padding:10px 12px;
  border-top:1px solid var(--line-2);
}
.proj{
  background:#fff;
  border:1px solid #E0E0E0;
  border-radius:8px;
  margin-bottom:8px;
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.04);
}
.proj:last-child{margin-bottom:0}
.proj-header{
  background:#2C2C2C;
  color:#fff;
  padding:9px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.proj-title{
  font-size:11px;
  font-weight:700;
  letter-spacing:.03em;
  text-transform:uppercase;
  color:#fff;
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.proj-status-badge{flex-shrink:0}
.proj-body{padding:12px 14px}


/* ── CARD ENRIQUECIDO v2 ── */
.proj-card-v2{background:#fff;border:1px solid #E0E0E0;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:8px}
.proj-card-v2:last-child{margin-bottom:0}

/* Header */
.proj-hdr{background:#2C2C2C;padding:9px 14px;display:flex;align-items:center;gap:10px;min-height:38px}
.proj-hdr-code{font-size:9px;font-weight:700;letter-spacing:.1em;background:rgba(255,255,255,.15);color:#fff;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;font-family:monospace}
.proj-hdr-title{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.proj-hdr-status{flex-shrink:0;margin-left:8px}

/* Body — dois painéis */
.proj-body-v2{display:grid;grid-template-columns:250px 1fr;align-items:stretch}

/* Painel esquerdo — Representante */
.proj-rep-panel{padding:12px 14px;border-right:1px solid #EEEEEE;background:#FAFAFA;display:flex;flex-direction:column;gap:0}
.proj-rep-section-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#BBBBBB;margin-bottom:8px}
.proj-rep-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.proj-rep-avatar{width:34px;height:34px;border-radius:50%;background:#E30613;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.proj-rep-name{font-size:12px;font-weight:600;color:#2C2C2C;line-height:1.3}
.proj-rep-loc{font-size:10px;color:#888;margin-top:1px}
.proj-rep-time{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.proj-rep-clock{font-size:11px;font-weight:700;color:#2C2C2C;font-variant-numeric:tabular-nums}
.proj-rep-tz{font-size:10px;color:#AAAAAA}
.badge-exp{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap}
.badge-exp.open{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.badge-exp.closed{background:#FFF1F2;color:#BE123C;border:1px solid #FECDD3}
.proj-rep-contacts{display:flex;flex-direction:column;gap:5px;padding-top:8px;border-top:1px solid #EEEEEE;margin-top:auto}
.proj-contact-row{display:flex;align-items:center;gap:5px}
.proj-contact-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:4px 8px;border-radius:4px;font-size:10px;font-weight:500;text-decoration:none;border:1px solid #E4E4E4;background:#fff;color:#4A4A4A;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;transition:border-color .15s,color .15s}
.proj-contact-btn:hover{border-color:#2C2C2C;color:#2C2C2C}
.proj-contact-btn.wa{border-color:#BBF7D0;background:#F0FDF4;color:#166534}
.proj-contact-btn.wa:hover{background:#DCFCE7}
.proj-contact-btn.tel{color:#4A4A4A}
.proj-copy{width:26px;height:26px;border-radius:4px;border:1px solid #E4E4E4;background:#fff;color:#AAAAAA;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;flex-shrink:0;transition:all .15s}
.proj-copy:hover{border-color:#2C2C2C;color:#2C2C2C}

/* Painel direito — Projeto */
.proj-info-panel{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.proj-info-section-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#BBBBBB}

/* Linha de metadados: Cliente · Vertical · Área */
.proj-meta-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;padding-bottom:10px;border-bottom:1px solid #F0F0F0}
.proj-meta-field{display:flex;flex-direction:column;gap:3px}
.proj-meta-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#BBBBBB}
.proj-meta-value{font-size:12px;font-weight:600;color:#2C2C2C;display:flex;align-items:center;gap:4px}
.proj-vert-dot{width:7px;height:7px;border-radius:50%;background:#E30613;flex-shrink:0;display:inline-block}

/* Produtos + Aplicação lado a lado */
.proj-prods-apli{display:grid;grid-template-columns:1fr;gap:14px}
.proj-col-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#BBBBBB;margin-bottom:6px}

/* Produto linha */
.proj-prod-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #F5F5F5}
.proj-prod-row:last-child{border-bottom:none}
.proj-prod-left{display:flex;align-items:center;gap:6px;min-width:0}
.proj-prod-dash{width:3px;height:13px;background:#E30613;border-radius:2px;flex-shrink:0}
.proj-prod-name{font-size:11px;font-weight:500;color:#2C2C2C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-prod-qty{font-size:10px;font-weight:600;color:#4A4A4A;background:#F5F5F5;border:1px solid #E0E0E0;border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0}

/* Aplicação linha */
.proj-apli-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #F5F5F5;font-size:11px;color:#2C2C2C}
.proj-apli-row:last-child{border-bottom:none}
.proj-apli-dash{width:3px;height:12px;background:#E30613;border-radius:2px;flex-shrink:0}

/* Observações */
.proj-obs-block{border-left:3px solid #E30613;padding:7px 10px;background:#FAFAFA;border-radius:0 4px 4px 0}
.proj-obs-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#BBBBBB;margin-bottom:4px}
.proj-obs-txt{font-size:11px;color:#555;line-height:1.6}

/* Footer */
.proj-footer-v2{padding:5px 14px;background:#F9F9F9;border-top:1px solid #F0F0F0;text-align:right;font-size:9px;color:#BBBBBB;letter-spacing:.04em}
.proj-footer-v2 b{color:#888;font-weight:500}


.proj-empty{color:#CCCCCC;font-style:normal}

function construirArvore(rows) {
  // Mapa reverso usando dados oficiais
  const paisParaSub = {}, subParaCont = {};
  for (const [cont, subs] of Object.entries(GEO_TREE)) {
    for (const [sub, paises] of Object.entries(subs)) {
      subParaCont[sub] = cont;
      paises.forEach(p => paisParaSub[p] = sub);
    }
  }

  const tree = {};

  rows.forEach(row => {
    let paisAt = String(row[10]||'').trim();
    // Normaliza: ISO → nome PT-BR, ou variante → nome canônico
    paisAt = NORM[paisAt] || paisAt;
    if (!paisAt) return;

    const empresa   = String(row[5]||'—').trim();
    const cliente   = String(row[11]||'').trim();
    if (!cliente) return;

    const area      = String(row[12]||'').trim();
    const produtos  = String(row[13]||'').trim();
    const projetos  = String(row[15]||'').trim();
    const repNome   = (String(row[1]||'')+' '+String(row[2]||'')).trim();
    const repPais   = NORM[String(row[3]||'').trim()] || String(row[3]||'').trim();
    const repCidade = String(row[4]||'').trim();

    const sub  = paisParaSub[paisAt] || 'Outros';
    const cont = subParaCont[sub]    || '🌐 Outros';

    if (!tree[cont])                       tree[cont]={};
    if (!tree[cont][sub])                  tree[cont][sub]={};
    if (!tree[cont][sub][paisAt])          tree[cont][sub][paisAt]={};
    if (!tree[cont][sub][paisAt][empresa]) tree[cont][sub][paisAt][empresa]={};
    if (!tree[cont][sub][paisAt][empresa][cliente]) tree[cont][sub][paisAt][empresa][cliente]=[];

    const status = String(row[17]||row[8]||'PROSPECCAO').trim();
    const repEmail = String(row[6]||'').trim();
    const repTel   = String(row[7]||'').trim().replace(/^'/,'');
    const qtd = String(row[14]||'').trim();
    const obs = String(row[16]||'').trim();
        const titulo      = String(row[18]||'').trim();
    const vertical    = String(row[19]||'').trim();
    const areaCliente2= String(row[20]||'').trim();
    const aplicacao   = String(row[21]||'').trim();
    const vertFinal   = vertical || area;
    const apliList    = aplicacao ? [aplicacao] : (projetos ? projetos.split(',').map(x=>x.trim()).filter(Boolean) : []);
    tree[cont][sub][paisAt][empresa][cliente].push({
      area, vertical:vertFinal, areaCliente:areaCliente2||'',
      aplicacoes:apliList, produtos, qtd, projetos, obs,
      titulo, criadoEm: row[0]||null,
      repNome, repPais, repCidade, repEmail, repTel, status
    });
  });

  return tree;
}

function ini(s){ return (s||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('') || '—'; }
function esc(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  const allPaises = new Set(), allEmp = new Set(), allCli = new Set();

      for (const [emp, clis] of Object.entries(emps)) { allEmp.add(emp); for (const c of Object.keys(clis)) allCli.add(c); }
    }

  if (subEl) subEl.textContent = 'de ' + Object.values(GEO_TREE).flatMap(s=>Object.values(s)).flat().length;

      return '<button class="chip" data-cont="'+key+'">'+esc(cont)+' <span class="num">'+n+'</span></button>';

  let html = '';
  for (const [cont, subs] of Object.entries(GEO_TREE)) {

    for (const sub of Object.keys(subs)) if (tree[cont] && tree[cont][sub]) contPaises += Object.keys(tree[cont][sub]).length;

    html +=       '<div class="cont-meta"><b>'+contPaises+'</b> de <b>'+totalPaisesCont+'</b> país'+(totalPaisesCont===1?'':'es')+' com representação</div></div>';
    html +=     '<div class="chev">'+CHEV+'</div>';
    html +=   '</header>';
    html +=   '<div class="cont-body">';

    for (const [sub, paisesGeo] of Object.entries(subs)) {
      const subData = tree[cont] && tree[cont][sub] ? tree[cont][sub] : {};
      const nPaises = Object.keys(subData).length;
      const subOpen = false; // sempre fechado no início

      html +=   '<div class="sub-body"><div class="country-grid">';

      // Ordenar: países com dados primeiro, depois vazios — ambos alfabéticos
      const paisesOrdenados = [...paisesGeo].sort((a, b) => {
        const aHas = subData[a] && Object.keys(subData[a]).length > 0;
        const bHas = subData[b] && Object.keys(subData[b]).length > 0;
        if (aHas && !bHas) return -1;
        if (!aHas && bHas) return 1;
        return a.localeCompare(b, 'pt-BR');
      });

      for (const paisGeo of paisesOrdenados) {

          html += '<div class="country-badge">'+nEmp+(nEmp===1?' representante':' representantes')+'</div>';
          html += '<div class="country-chev">'+CHEV+'</div>';

            html +=     '<div class="company-cnt">'+nCli+'</div>';

            html +=   '</div>';
            html +=   '<div class="company-body">';
            for (const [cliente, projetos] of Object.entries(clientes)) {

              html +=   '<div class="client-head" onclick="this.parentNode.classList.toggle(\'open\')">';
              html +=     '<div class="client-icon">🏭</div>';

}

const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('clearSearch');
let searchTimer;
searchInput.addEventListener('input', ()=>{
  clearTimeout(searchTimer);
  clearBtn.style.display = searchInput.value ? '' : 'none';
  searchTimer = setTimeout(applySearch, 120);
});
clearBtn.addEventListener('click', ()=>{ searchInput.value=''; clearBtn.style.display='none'; applySearch(); });

function applySearch(){
  const q = searchInput.value.trim().toLowerCase();

  if (!q) {
    // Sem filtro: remove hidden E fecha tudo — volta ao estado inicial limpo
    document.querySelectorAll('.cont,.sub,.country,.company,.client,.proj').forEach(el=>{
      el.classList.remove('hidden');
      el.classList.remove('open');
    });
    return;
  }

  // ── PASSO 1: determina quais .proj fazem match (texto completo do card) ──
  document.querySelectorAll('.proj').forEach(el=>{
    el.classList.toggle('hidden', !el.textContent.toLowerCase().includes(q));
  });

  // ── PASSO 2: .client — match no nome OU tem .proj visível abaixo ──
  document.querySelectorAll('.client').forEach(el=>{
    const nameHit = el.querySelector('.client-name').textContent.toLowerCase().includes(q);
    const hasProj = el.querySelectorAll('.proj:not(.hidden)').length > 0;
    const hit = nameHit || hasProj;
    el.classList.toggle('hidden', !hit);
    if (hit) {
      el.classList.add('open');
      // Se o próprio nome bateu, abre TODOS os filhos (proj) — mostra tudo
      if (nameHit) el.querySelectorAll('.proj').forEach(p=>p.classList.remove('hidden'));
    }
  });

  // ── PASSO 3: .company — match no nome OU tem .client visível abaixo ──
  document.querySelectorAll('.company').forEach(el=>{
    const nameHit = el.querySelector('.company-name').textContent.toLowerCase().includes(q);
    const hasCli  = el.querySelectorAll('.client:not(.hidden)').length > 0;
    const hit = nameHit || hasCli;
    el.classList.toggle('hidden', !hit);
    if (hit) {
      el.classList.add('open');
      // Match na empresa: abre TODOS clientes e projetos abaixo
      if (nameHit) {
        el.querySelectorAll('.client,.proj').forEach(c=>{
          c.classList.remove('hidden');
          c.classList.add('open');
        });
      }
    }
  });

  // ── PASSO 4: .country — match no nome OU tem .company visível ──
  document.querySelectorAll('.country').forEach(el=>{
    const nameHit = el.querySelector('.country-name').textContent.toLowerCase().includes(q);
    const hasComp = el.querySelectorAll('.company:not(.hidden)').length > 0;
    const hit = nameHit || hasComp;
    el.classList.toggle('hidden', !hit);
    if (hit && el.classList.contains('has-data')) {
      el.classList.add('open');
      if (nameHit) {
        el.querySelectorAll('.company,.client,.proj').forEach(c=>{
          c.classList.remove('hidden');
          c.classList.add('open');
        });
      }
    }
  });

  // ── PASSO 5: .sub e .cont — propagação ascendente ──
  document.querySelectorAll('.sub').forEach(el=>{
    const hit = el.querySelectorAll('.country:not(.hidden)').length > 0;
    el.classList.toggle('hidden', !hit);
    if (hit) el.classList.add('open');
  });
  document.querySelectorAll('.cont').forEach(el=>{
    const hit = el.querySelectorAll('.sub:not(.hidden)').length > 0;
    el.classList.toggle('hidden', !hit);
    if (hit) el.classList.add('open');
  });
}

// ── HORA LOCAL E CONTATOS ────────────────────────────────────
function localTimeFromFuso(fuso) {
  if (!fuso) return null;
  const m = fuso.match(/UTC([+-])(\d+)/);
  if (!m) return null;
  const sign = m[1] === '+' ? 1 : -1;
  const offset = sign * parseInt(m[2]);
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const local = new Date(utc + offset * 3600000);
  const h = local.getHours();
  const min = String(local.getMinutes()).padStart(2,'0');
  const commercial = h >= 8 && h < 18;
  return { time: h + ':' + min, h, commercial };
}


function buildProjTitle(p, paisAt) {
  const parts = [];
  if (p.cliente) parts.push(p.cliente.toUpperCase());
  if (paisAt)    parts.push(paisAt);
  if (p.area)    parts.push(p.area);
  // Primeiro projeto/aplicação se existir
  const projs = p.projetos ? p.projetos.split(',').map(x=>x.trim()).filter(Boolean) : [];
  if (projs.length) parts.push(projs[0]);
  return parts.join(' · ');
}

function formatCriadoEm(dt) {
  if (!dt) return '';
  try {
    const d = dt instanceof Date ? dt : new Date(dt);
    if (isNaN(d)) return '';
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mn = String(d.getMinutes()).padStart(2,'0');
    return dd+'.'+mm+'.'+d.getFullYear()+' · '+hh+':'+mn;
  } catch(e){ return ''; }
}

let _projSeq = 0;
function gerarCodigo(repPais) {
  _projSeq++;
  const iso = (repPais||'XX').substring(0,2).toUpperCase();
  const seq = String(_projSeq).padStart(3,'0');
  const rnd = String(Math.floor(Math.random()*90+10));
  return iso+'-'+rnd+'-'+seq;
}

function copyText(txt, el) {
  navigator.clipboard.writeText(txt).then(() => {
    const orig = el.textContent;
    el.textContent = '✓ copiado';
    setTimeout(() => el.textContent = orig, 1500);
  });
}

async function carregarDados() {
  document.getElementById('mapa').innerHTML = '<div class="loading"><div class="spinner"></div><div>Carregando dados da planilha...</div></div>';
  try {
    const resp = await fetch(APPS_URL + '?action=getData');
    const json = await resp.json();
    if (json.status === 'ok' && json.rows && json.rows.length > 0) {
      renderMapa(construirArvore(json.rows), json.rows.length);
    } else {
      renderMapa({}, 0);
    }
  } catch(e) {
    document.getElementById('mapa').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro ao carregar</h3><p>Verifique se o Apps Script v5 está implantado.<br><small style="font-family:JetBrains Mono,monospace;opacity:.6">'+esc(e.message)+'</small></p></div>';
  }
}

(function checkAuth() {
  try {
    const s = JSON.parse(localStorage.getItem('promont_session') || 'null');
    if (!s || !s.token || s.expira < Date.now()) {
      // Sessão ausente ou expirada — redirecionar para login
      localStorage.removeItem('promont_session');
      window.location.href = 'login.html';
      return;
    }
    // Sessão válida — mostrar nome do usuário no header
    const badgeEl = document.getElementById('badge');
    if (badgeEl && s.nome) {
      const userEl = document.createElement('span');
      userEl.style.cssText = 'font-size:11px;color:rgba(255,255,255,.5);margin-left:8px';
      userEl.textContent = s.nome + ' · ' + (s.nivel||'');
      badgeEl.parentElement.appendChild(userEl);
    }
    // Botão sair
    const hdrActions = document.querySelector('.hdr-actions');
    if (hdrActions) {
      const sairBtn = document.createElement('button');
      sairBtn.className = 'btn-hdr';
      sairBtn.innerHTML = '<i class="ti ti-logout"></i> Sair';
      sairBtn.onclick = function() {
        localStorage.removeItem('promont_session');
        window.location.href = 'login.html';
      };
      hdrActions.appendChild(sairBtn);
    }
  } catch(e) {
    window.location.href = 'login.html';
  }
})();

carregarDados();
</script>
</body>
</html>
